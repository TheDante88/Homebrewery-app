<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sabbia Nera - HB Mobile</title>
  
  <link rel="manifest" href="./manifest.json">
  <link href="https://use.fontawesome.com/releases/v5.15.1/css/all.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700" rel="stylesheet">
  <link href="https://homebrewery.naturalcrit.com/homebrew.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">

  <!-- API Google per Sincronizzazione Drive -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
</head>
<body>

  <header class="top-bar">
    <button id="btnAuthDrive" class="drive-btn"><i class="fab fa-google-drive"></i> Login</button>
    <button id="btnOpenDrive" class="hidden"><i class="fas fa-folder-open"></i> I Miei File</button>
    <button id="btnSaveDrive" class="hidden"><i class="fas fa-cloud-upload-alt"></i> Salva</button>
    <button id="btnStyles"><i class="fas fa-palette"></i> Stile</button>
    <button id="btnToggle" class="primary"><i class="fas fa-eye"></i> Anteprima</button>
  </header>

  <main>
    <textarea id="editor" placeholder="Scrivi il tuo codice Homebrewery v3 qui..."></textarea>
    
    <div id="preview-container" class="hidden">
      <!-- Le pagine verranno iniettate qui -->
    </div>
  </main>

  <footer class="bottom-toolbar">
    <div class="toolbar-scroll">
      
      <div class="toolbar-divider">Testo Base</div>
      <button class="snippet-btn" data-prefix="**" data-suffix="**">Grassetto (**)</button>
      <button class="snippet-btn" data-prefix="<b>" data-suffix="</b>">Grassetto Tab (b)</button>
      <button class="snippet-btn" data-prefix="*" data-suffix="*">Corsivo</button>
      <button class="snippet-btn" data-prefix="\n# " data-suffix="\n">H1</button>
      <button class="snippet-btn" data-prefix="\n## " data-suffix="\n">H2</button>
      <button class="snippet-btn" data-prefix="\n### " data-suffix="\n">H3</button>
      
      <div class="toolbar-divider">Struttura V3</div>
      <button class="snippet-btn" data-prefix="\n\page\n\n" data-suffix="">Pagina</button>
      <button class="snippet-btn" data-prefix="\n\column\n\n" data-suffix="">Colonna</button>
      <button class="snippet-btn" data-prefix="\n{{wide\n" data-suffix="\n}}\n">Wide Block</button>
      <button class="snippet-btn" data-prefix="\n{{pageNumber,auto}}\n" data-suffix="">Num Pagina</button>
      <button class="snippet-btn" data-prefix="\n{{footnote " data-suffix="}}\n">Footnote</button>

      <div class="toolbar-divider">I Tuoi Box</div>
      <button class="snippet-btn custom-box" data-prefix="\n<div class='quote-box'>\n&quot;<b>" data-suffix="</b>&quot;\n<br>— <b>Autore</b>\n</div>\n">Quote Box</button>
      <button class="snippet-btn custom-box" data-prefix="\n<div class='lore-box'>\n<b>Titolo</b>\n" data-suffix="\n</div>\n">Lore Box</button>
      <button class="snippet-btn custom-box" data-prefix="\n<table class='history-table'>\n<thead>\n  <tr><th><b>Titolo 1</b></th><th><b>Titolo 2</b></th></tr>\n</thead>\n<tbody>\n  <tr><td>" data-suffix="</td><td>Dato 2</td></tr>\n</tbody>\n</table>\n">Tab Storica</button>
      <button class="snippet-btn custom-box" data-prefix="\n<table class='d-table gold-th'>\n<tr><th><b>d6</b></th><th><b>Ideale</b></th></tr>\n<tr><td>1</td><td>" data-suffix="</td></tr>\n</table>\n">Tab Dadi</button>
    </div>
  </footer>

  <!-- Modal Stile -->
  <div id="styleModal" class="modal hidden">
    <div class="modal-content">
      <h3>Modifica CSS (Sabbia Nera)</h3>
      <textarea id="styleEditor"></textarea>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button id="saveStyles" class="primary">Applica</button>
        <button id="closeStyles">Chiudi</button>
      </div>
    </div>
  </div>

  <!-- Modal File Drive -->
  <div id="driveModal" class="modal hidden">
    <div class="modal-content">
      <h3>I Tuoi File su Homebrewery</h3>
      <div id="driveFileList" class="file-list">Caricamento...</div>
      <button id="closeDrive" style="margin-top: 10px;">Chiudi</button>
    </div>
  </div>

  <style id="customAdventureStyles"></style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./script.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
      <button class="snippet-btn" data-insert="*Testo*" data-cursor="-6">Corsivo</button>
      <button class="snippet-btn" data-insert="\\n# Titolo 1\\n">H1</button>
      <button class="snippet-btn" data-insert="\\n## Titolo 2\\n">H2</button>
      <button class="snippet-btn" data-insert="\\n### Titolo 3\\n">H3</button>
      
      <div class="toolbar-divider">Struttura V3</div>
      <button class="snippet-btn" data-insert="\\n\\page\\n\\n">Nuova Pagina</button>
      <button class="snippet-btn" data-insert="\\n\\column\\n\\n">Colonna</button>
      <button class="snippet-btn" data-insert="\\n{{wide\\n\\n}}\\n" data-cursor="-4">Wide</button>
      <button class="snippet-btn" data-insert="\\n{{pageNumber,auto}}\\n">Num Pagina</button>
      <button class="snippet-btn" data-insert="\\n{{footnote Manuale | Capitolo}}\\n">Footnote</button>

      <div class="toolbar-divider">Box & Tabelle</div>
      <button class="snippet-btn custom-box" data-insert="\\n<div class='quote-box'>\\n&quot;<b>Citazione qui.</b>&quot;\\n<br>— <b>Autore</b>\\n</div>\\n\\n">Quote Box</button>

    </div>
  </footer>

  <div id="styleModal" class="modal hidden">
    <div class="modal-content">
      <h3>Stile CSS Avventura</h3>
      <textarea id="styleEditor" placeholder="Inserisci il tuo CSS..."></textarea>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button id="saveStyles" class="primary">Applica e Salva</button>
        <button id="closeStyles">Chiudi</button>
      </div>
    </div>
  </div>

  <style id="customAdventureStyles"></style>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>

      <h3>Modifica Stile Avventura</h3>

        <button id="saveStyles" class="primary">Applica CSS</button>
        <button id="closeStyles">Chiudi</button>
      </div>
    </div>
  </div>

  <style id="customAdventureStyles"></style>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

</body>
</html>
